name: Build Legacy

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream release tag to build (e.g. b4050)'
        required: true
      targets:
        description: 'Comma-separated build targets (e.g. ubuntu-arm64,ubuntu-x64)'
        required: false
        default: 'ubuntu-arm64,ubuntu-x64'

permissions:
  contents: write

env:
  UPSTREAM_REPO: ggml-org/llama.cpp
  CMAKE_ARGS: >-
    -DLLAMA_BUILD_EXAMPLES=OFF
    -DLLAMA_BUILD_TESTS=OFF
    -DLLAMA_BUILD_TOOLS=ON
    -DLLAMA_BUILD_SERVER=ON
    -DGGML_RPC=ON

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: ubuntu-arm64
            os: ubuntu-24.04-arm
            container: ubuntu:20.04
            arch: arm64
          - target: ubuntu-x64
            os: ubuntu-latest
            container: ubuntu:20.04
            arch: x64

    runs-on: ${{ matrix.os }}
    if: ${{ contains(fromJSON(format('["{0}"]', github.event.inputs.targets)), matrix.target) }}

    steps:
      - name: Clone upstream
        uses: actions/checkout@v6
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ github.event.inputs.upstream_tag }}

      - name: Build in legacy container
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ${{ matrix.container }} \
            bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y software-properties-common
              add-apt-repository -y ppa:ubuntu-toolchain-r/test
              apt-get update
              apt-get install -y build-essential cmake git libssl-dev gcc-12 g++-12
              export CC=gcc-12
              export CXX=g++-12
              cmake -B build \
                -DCMAKE_INSTALL_RPATH='$ORIGIN' \
                -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
                -DGGML_BACKEND_DL=ON \
                -DGGML_NATIVE=OFF \
                -DGGML_CPU_ALL_VARIANTS=ON \
                -DLLAMA_FATAL_WARNINGS=ON \
                ${{ env.CMAKE_ARGS }}
              cmake --build build --config Release -j $(nproc)
              echo "=== Build output ==="
              ls -lh build/bin/
              test -f build/bin/llama-server || { echo "ERROR: llama-server not found"; exit 1; }
              test -f build/bin/llama-cli || { echo "ERROR: llama-cli not found"; exit 1; }
              cp LICENSE build/bin/
              tar -czvf /workspace/llama-${{ github.event.inputs.upstream_tag }}-bin-ubuntu-${{ matrix.arch }}.tar.gz \
                --transform "s,./,llama-${{ github.event.inputs.upstream_tag }}/," \
                -C build/bin .
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: llama-${{ github.event.inputs.upstream_tag }}-bin-ubuntu-${{ matrix.arch }}
          path: llama-${{ github.event.inputs.upstream_tag }}-bin-ubuntu-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.upstream_tag }}
          name: "llama.cpp ${{ github.event.inputs.upstream_tag }} (legacy build)"
          body: |
            Legacy build of [llama.cpp ${{ github.event.inputs.upstream_tag }}](https://github.com/ggml-org/llama.cpp/releases/tag/${{ github.event.inputs.upstream_tag }}) for glibc >= 2.31.

            **Upstream changelog:** https://github.com/ggml-org/llama.cpp/commits/${{ github.event.inputs.upstream_tag }}
          draft: true
          files: artifacts/**/*.tar.gz
